name: Trust

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  trust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.1.6
        with:
          fetch-depth: 0

      - name: CorvidLabs Trust gate
        id: trust
        uses: CorvidLabs/trust@9d32b5786d2e9e4d39fc581c0091c721ee3d4226 # v1.0.0

      - name: Check managed agent rules
        run: grep -q "CorvidLabs trust toolchain: BEGIN" AGENTS.md
