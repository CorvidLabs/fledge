# spec-sync v5 configuration
# Docs: https://github.com/CorvidLabs/spec-sync

specs_dir = "specs"
source_dirs = ["src", "templates"]
exclude_dirs = []
# test_support.rs is #[cfg(test)]-only test infrastructure (never in the shipped
# binary); the template .github workflows are scaffolding CI copied into generated
# projects, not fledge's own behavior. Neither warrants a spec.
exclude_patterns = ["src/test_support.rs", "**/.github/**"]
required_sections = ["Purpose", "Public API", "Invariants", "Behavioral Examples", "Error Cases", "Dependencies", "Change Log"]
enforcement = "strict"
[lifecycle]
track_history = false
