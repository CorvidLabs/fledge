name: trust

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  trust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: CorvidLabs Trust gate
        id: trust
        uses: CorvidLabs/trust@a239f78658e5ad0f12fa230f494890e40c6e4d7b # v1.1.1

      - name: Check managed agent rules
        run: |
          grep -q "CorvidLabs trust toolchain: BEGIN" AGENTS.md
          grep -q "CorvidLabs trust toolchain: END" AGENTS.md
