name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
      - 'src/**'
      - 'specs/**'
      - '.atlasignore'
  workflow_dispatch:
  schedule:
    # Weekly Monday 08:00 UTC — refreshes plugin registry
    - cron: '0 8 * * 1'

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Astro Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Restore plugin registry cache
        uses: actions/cache@v4
        with:
          path: |
            site/src/data/plugins.json
            site/src/data/plugins
          key: plugin-registry-${{ github.run_id }}
          restore-keys: |
            plugin-registry-

      - name: Install dependencies
        working-directory: site
        run: bun install --frozen-lockfile

      - name: Run unit tests
        working-directory: site
        run: bun test

      - name: Resolve pinned atlas commit (cache key)
        id: atlasref
        run: echo "sha=$(git ls-remote https://github.com/CorvidLabs/fledge-plugin-atlas v1 | cut -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache the fledge-atlas CLI
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/fledge-atlas
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: fledge-atlas-${{ runner.os }}-${{ steps.atlasref.outputs.sha }}

      - name: Render atlas coverage badges
        uses: CorvidLabs/fledge-plugin-atlas@v1
        with:
          path: .
          output-dir: site/public/badges
          components: "coverage langmix treemap sunburst"

      - name: Build site (runs prebuild for plugin registry + redirects)
        working-directory: site
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
